<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شهادات موسم الحج - لجنة تقنية المعلومات</title>
<style>
  @font-face {
    font-family: 'ArslanWessam';
    src: url('Arslan-Wessam-B.ttf') format('truetype');
    font-weight: 400;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(135deg, #060b16 0%, #0d1b33 45%, #0a142a 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 50px;
    padding-bottom: 50px;
  }

  .page-title {
    text-align: center;
    margin-bottom: 30px;
    padding: 0 20px;
  }

  .page-title h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .page-title p {
    color: #8fa3c7;
    font-size: 14px;
  }

  .card {
    background: rgba(81, 112, 255, 0.06);
    border: 1px solid rgba(81, 112, 255, 0.25);
    border-radius: 20px;
    padding: 35px;
    width: 100%;
    max-width: 480px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(81, 112, 255, 0.08);
  }

  .card-title {
    color: #fff;
    text-align: center;
    font-size: 20px;
    margin-bottom: 25px;
    font-weight: 700;
  }

  .input-group { margin-bottom: 20px; }

  label {
    display: block;
    color: #9fb1d4;
    margin-bottom: 8px;
    font-size: 15px;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1.5px solid rgba(81, 112, 255, 0.35);
    background: rgba(255,255,255,0.04);
    color: #5170ff;
    font-family: 'Tajawal', sans-serif;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    direction: rtl;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
  }

  input[type="text"]::placeholder { color: rgba(81, 112, 255, 0.45); }
  input[type="text"]:focus {
    border-color: #5170ff;
    background: rgba(81, 112, 255, 0.08);
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #5170ff, #2f48c4);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Tajawal', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.3s, transform 0.2s;
    margin-top: 5px;
  }

  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .preview-section {
    margin-top: 30px;
    text-align: center;
    display: none;
  }

  .preview-section.visible { display: block; }

  .preview-label {
    color: #9fb1d4;
    margin-bottom: 12px;
    font-size: 14px;
  }

  #canvas-wrapper {
    display: inline-block;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    max-width: 300px;
    width: 100%;
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  .download-btn {
    margin-top: 18px;
    display: inline-block;
    padding: 13px 35px;
    background: linear-gradient(135deg, #5170ff, #2f48c4);
    color: #fff;
    border-radius: 10px;
    text-decoration: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 700;
    transition: opacity 0.3s;
  }

  .download-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="page-title">
  <h1>شهادات موسم الحج 1447هـ</h1>
  <p>لجنة تقنية المعلومات</p>
</div>

<div class="card">
  <div class="card-title">اكتب اسمك لإنشاء شهادتك</div>
  <div class="input-group">
    <label>الاسم</label>
    <input type="text" id="nameInput" placeholder="الاسم هنا..." />
  </div>
  <button class="btn" id="generateBtn" onclick="generateCard()">إنشاء الشهادة</button>
</div>

<div class="preview-section" id="previewSection">
  <p class="preview-label">معاينة الشهادة</p>
  <div id="canvas-wrapper">
    <canvas id="myCanvas"></canvas>
  </div>
  <br>
  <a class="download-btn" id="downloadBtn" download="شهادة_تقدير.png">⬇️ تحميل الصورة</a>
</div>

<script>
  // ① تحميل الصورة والخط مرة وحدة عند فتح الصفحة
  const templateImg = new Image();
  let imgReady = false;

fetch('post.png')
  .then(r => r.blob())
    .then(blob => {
      templateImg.src = URL.createObjectURL(blob);
      templateImg.onload = () => { imgReady = true; };
    })
    .catch(e => console.error('post.png error:', e));

  const customFont = new FontFace('ArslanWessam', "url('Arslan-Wessam-B.ttf')", { weight: '400' });
  customFont.load()
    .then(f => { document.fonts.add(f); })
    .catch(e => console.log('Font fallback:', e));

  // ② عند الضغط على الزر
  async function generateCard() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) {
      alert('من فضلك اكتب اسمك أولاً');
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = '⏳ جاري الإنشاء...';

    try {
      if (!imgReady) {
        await new Promise((resolve, reject) => {
          templateImg.onload = () => { imgReady = true; resolve(); };
          templateImg.onerror = reject;
          setTimeout(reject, 15000);
        });
      }

      // ضمان تحميل الخط فعلياً قبل الرسم
      await document.fonts.load("400 50px ArslanWessam");

      const canvas = document.getElementById('myCanvas');
      const ctx = canvas.getContext('2d');

      canvas.width  = templateImg.naturalWidth;
      canvas.height = templateImg.naturalHeight;
      ctx.drawImage(templateImg, 0, 0);

      const cx       = canvas.width / 2;
      const nameY    = Math.round(canvas.height * 0.426);
      const fontSize = Math.round(canvas.width * 0.07);

      ctx.font         = `400 ${fontSize}px ArslanWessam, Tajawal, sans-serif`;
      ctx.fillStyle    = '#5170ff';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.direction    = 'rtl';
      ctx.fillText(name, cx, nameY);

      document.getElementById('downloadBtn').href = canvas.toDataURL('image/png');
      document.getElementById('previewSection').classList.add('visible');
      document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth' });

    } catch (err) {
      alert('تعذّر تحميل الصورة، تأكد من اتصال الإنترنت وأعد المحاولة');
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = 'إنشاء الشهادة';
    }
  }

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateCard();
  });
</script>

</body>
</html>
